<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tráileres - Sistema de Gestión</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/modulo.css">
</head>
<body class="menu-body">
<header class="topbar">
    <h2>🚚 Gestión de Tráileres</h2>
    <div class="user-info">
        <a href="/menu.html" class="btn-volver">← Volver al menú</a>
        <span id="userLabel"></span>
        <button id="logoutBtn">Cerrar sesión</button>
    </div>
</header>

<main class="modulo-container">
    <div class="modulo-header">
        <h3>Lista de Tráileres</h3>
        <button id="btnNuevo" class="btn-primary">+ Nuevo Tráiler</button>
    </div>

    <p id="mensaje" class="mensaje"></p>

    <table class="tabla">
        <thead>
        <tr>
            <th>Placa</th>
            <th>Marca</th>
            <th>Modelo</th>
            <th>Capacidad (t)</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody id="tablaBody"></tbody>
    </table>
</main>

<!-- Modal formulario -->
<div id="modal" class="modal-overlay">
    <div class="modal-box">
        <h3 id="modalTitulo">Nuevo Tráiler</h3>
        <form id="trailerForm">
            <input type="hidden" id="idTrailer">

            <label>Placa</label>
            <input type="text" id="placa" required>

            <label>Marca</label>
            <input type="text" id="marca" required>

            <label>Modelo</label>
            <input type="text" id="modelo" required>

            <label>Capacidad (toneladas)</label>
            <input type="number" step="0.01" id="capacidad" required>

            <label>Toneladas (peso propio)</label>
            <input type="number" step="0.01" id="toneladas">

            <label>Estado</label>
            <select id="estado">
                <option value="DISPONIBLE">Disponible</option>
                <option value="ASIGNADO">Asignado</option>
                <option value="MANTENIMIENTO">Mantenimiento</option>
            </select>

            <div class="modal-actions">
                <button type="button" id="btnCancelar" class="btn-secondary">Cancelar</button>
                <button type="submit" class="btn-primary">Guardar</button>
            </div>
        </form>
    </div>
</div>

<script src="js/traileres.js"></script>
</body>
</html>
