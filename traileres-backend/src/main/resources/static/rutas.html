<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Rutas - Sistema de Gestión</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/menu.css">
  <link rel="stylesheet" href="css/modulo.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

</head>
<body class="menu-body">
<header class="topbar">
  <h2>🗺️ Gestión de Rutas</h2>
  <div class="user-info">
    <a href="/menu.html" class="btn-volver">← Volver al menú</a>
    <span id="userLabel"></span>
    <button id="logoutBtn">Cerrar sesión</button>
  </div>
</header>

<main class="modulo-container">
  <div class="modulo-header">
    <h3>Lista de Rutas</h3>
    <button id="btnNuevo" class="btn-primary">+ Nueva Ruta</button>
  </div>

  <p id="mensaje" class="mensaje"></p>

  <table class="tabla">
    <thead>
    <tr>
      <th>Trailer</th>
      <th>Conductor</th>
      <th>Origen</th>
      <th>Destino</th>
      <th>Estado</th>
      <th>Acciones</th>
    </tr>
    </thead>
    <tbody id="tablaBody"></tbody>
  </table>
</main>
<div id="modalMapa" class="modal-overlay">
  <div class="modal-box modal-mapa">
    <h3>Mapa de Ruta</h3>
    <p id="mapaInfo" class="mapa-info">Calculando ruta...</p>
    <div id="mapaContenedor"></div>
    <div class="modal-actions">
      <button type="button" id="btnCerrarMapa" class="btn-secondary">Cerrar</button>
    </div>
  </div>
</div>
<div id="modal" class="modal-overlay">
  <div class="modal-box">
    <h3>Nueva Ruta</h3>
    <form id="rutaForm">
      <label>Tráiler</label>
      <select id="idTrailer" required></select>

      <label>Conductor</label>
      <select id="idConductor" required></select>

      <label>Origen</label>
      <input type="text" id="origen" required>

      <label>Destino</label>
      <input type="text" id="destino" required>

      <div class="modal-actions">
        <button type="button" id="btnCancelar" class="btn-secondary">Cancelar</button>
        <button type="submit" class="btn-primary">Guardar</button>
      </div>
    </form>
  </div>
</div>

<script src="js/rutas.js"></script>
</body>
</html>
